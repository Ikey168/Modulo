# Modulo login theme — CSS-only skin over the built-in Keycloak login theme.
# No FreeMarker templates are forked, so Keycloak upgrades keep working; all
# styling lives in resources/css/modulo.css and mirrors the frontend design
# system (frontend/src/styles/index.css: green-black canvas, emerald accent,
# Inter body type, sharp corners).
parent=keycloak
styles=css/login.css css/modulo.css
