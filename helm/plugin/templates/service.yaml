apiVersion: v1
kind: Service
metadata:
  name: {{ include "modulo-plugin.name" . }}
  labels:
    {{- include "modulo-plugin.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "modulo-plugin.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.grpcPort }}
      targetPort: grpc
