apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: modulo-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ikey168/Modulo.git
    targetRevision: main
    path: argocd/apps
    directory:
      # Pick up the plugins/ app family (#394) alongside the flat apps.
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: modulo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
