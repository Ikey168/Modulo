apiVersion: apps/v1
kind: Deployment
metadata:
  name: modulo-backend-deployment # Updated to match HPA target
  namespace: modulo-app # Updated to match HPA target namespace
  labels:
    app: modulo-backend
spec:
  replicas: 1 # Default replicas, HPA will manage this
  selector:
    matchLabels:
      app: modulo-backend
  template:
    metadata:
      labels:
        app: modulo-backend
    spec:
      containers:
      - name: modulo-backend-container # Consistent naming
        image: moduloacr.azurecr.io/modulo-backend:dev # Using image from Terraform variables, adjust if deployed differently
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: api-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3
