decision_logs:
  console: false
  service: decision_logger
  reporting:
    min_delay_seconds: 1
    max_delay_seconds: 30

services:
  decision_logger:
    url: http://audit-collector:8080/v1/decisions
    headers:
      Authorization: Bearer ${AUDIT_SERVICE_TOKEN}
      Content-Type: application/json
    
# Policies are loaded from the mounted /policies directory (see the OPA
# `run ... /policies` command), so no remote bundle service is configured.

plugins:
  envoy_ext_authz_grpc:
    addr: ":9191"
    query: data.envoy.authz.allow
    enable_reflection: true

# Expose status/metrics on the Prometheus endpoint (scraped by the prometheus
# service), but do NOT print them to stdout: status.console=true makes OPA
# serialize its entire Prometheus metric set into the status output on every
# status update (~every 20s), which floods `docker compose up`. The metrics are
# unchanged and still available at OPA's /metrics endpoint.
status:
  console: false
  prometheus: true

# OpenTelemetry configuration for trace correlation
distributed_tracing:
  type: grpc
  address: otel-collector:4317
  service_name: opa-authz
  sample_percentage: 100
