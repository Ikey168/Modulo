receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        
  # Receive logs from applications
  fluentforward:
    endpoint: 0.0.0.0:8006

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    
  # Add service metadata and correlation IDs
  attributes:
    actions:
      - key: service.name
        value: "modulo-authorization"
        action: upsert
      - key: audit.enabled
        value: true
        action: upsert
      - key: environment
        from_attribute: deployment.environment
        action: upsert
        
  # Add resource detection
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    
  # Filter sensitive data
  filter/audit:
    traces:
      span:
        - 'attributes["http.request.header.authorization"] != nil'
        - 'attributes["http.request.body"] != nil'
    logs:
      log_record:
        - 'IsMatch(body, ".*password.*")'
        - 'IsMatch(body, ".*secret.*")'
        - 'IsMatch(body, ".*token.*")'
        
  # Generate span metrics for monitoring
  spanmetrics:
    metrics_exporter: prometheus
    latency_histogram_buckets: [2ms, 5ms, 10ms, 20ms, 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - name: http.method
      - name: http.status_code
      - name: authz.decision
        default: unknown
      - name: authz.resource_type
        default: unknown
      - name: authz.action
        default: unknown
      - name: user.tenant
        default: unknown
    dimensions_cache_size: 1000

  # Transform logs to add audit context
  transform/audit:
    log_statements:
      - context: log
        statements:
          - set(attributes["audit.timestamp"], UnixNano(Now()))
          - set(attributes["audit.service"], "modulo-opa")

exporters:
  # OTLP for distributed tracing (replaces Jaeger)
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true
      
  # Prometheus for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    const_labels:
      service: "otel-collector"
      
  # OTLP HTTP for log aggregation to Loki
  otlphttp:
    endpoint: "http://loki:3100/otlp"
    
  # Elasticsearch for searchable audit logs
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: "otel-audit-logs-%{+yyyy.MM.dd}"
    pipeline: "audit-enrichment"
    mapping:
      mode: ecs

service:
  pipelines:
    # Traces pipeline for request correlation
    traces:
      receivers: [otlp]
      processors: [resourcedetection, attributes, filter/audit, spanmetrics, batch]
      exporters: [otlp]
      
    # Metrics pipeline for authorization monitoring
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, attributes, batch]
      exporters: [prometheus]
      
    # Logs pipeline for audit trail
    logs:
      receivers: [otlp, fluentforward]
      processors: [resourcedetection, attributes, transform/audit, filter/audit, batch]
      exporters: [otlphttp, elasticsearch]

  # Extensions for health and monitoring
  extensions: [health_check, pprof, zpages]
  
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    
  pprof:
    endpoint: 0.0.0.0:1777
    
  zpages:
    endpoint: 0.0.0.0:55679
