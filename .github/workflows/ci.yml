name: CI

on:
  push:
    branches: [ "main", "feature/*", "*-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and test
      run: mvn -B verify -Dmaven.test.failure.ignore=false
      # Full `verify` runs the 544-test suite (incl. Testcontainers integration
      # tests) plus the JaCoCo coverage gate; 10 min was too tight once the suite
      # runs to completion rather than fast-failing.
      timeout-minutes: 25

  # B9 (#302) — core/experience boundary guard.
  # Blocks merges that re-introduce direct imports of workspace internals
  # (workspaceApi, workspace/types, useWorkspaceData) from feature-pack code.
  # Feature packs must import exclusively through @modulo/core.
  # See: docs/architecture/B2-boundary-audit.md
  boundary-lint:
    name: Boundary lint (B9)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        # Workspaces monorepo: the lockfile lives at the repo root, not in frontend/.
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      # npm ci must run at the workspace root (root package-lock.json covers frontend).
      run: npm ci

    - name: Boundary lint — no workspace internals in feature-pack code
      working-directory: frontend
      run: npm run lint:boundary:ci

  # #405 — action.wasm.execute ABI conformance.
  # Rebuilds both example modules from source and fails if the rebuilt
  # binaries drift from the checked-in test fixtures the backend suite
  # (WasmNodeTest) validates and executes. A drift here means the ABI, the
  # toolchain pin, or the fixtures changed without the others following.
  wasm-node-examples:
    name: WASM node examples (ADR 0003)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build AssemblyScript example
      working-directory: examples/wasm-nodes/assemblyscript
      run: |
        npm ci --no-audit --no-fund
        npm run build

    - name: Build Rust example
      working-directory: examples/wasm-nodes/rust
      # rust-toolchain.toml pins the compiler and target; the rustup shim
      # installs both on first use, keeping the rebuild byte-reproducible.
      run: cargo build --release --target wasm32-unknown-unknown

    - name: Rebuilt binaries must match the backend test fixtures
      run: |
        cmp examples/wasm-nodes/assemblyscript/build/titlecase.wasm \
            backend/src/test/resources/wasm/titlecase.wasm
        cmp examples/wasm-nodes/rust/target/wasm32-unknown-unknown/release/modulo_wasm_node_wordstats.wasm \
            backend/src/test/resources/wasm/wordstats.wasm