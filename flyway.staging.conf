# Flyway configuration for the docker-compose stack.
# Values match the `db` service defaults (POSTGRES_DB/USER/PASSWORD).
# Flyway does not understand shell-style ${VAR:-default} placeholders, so these
# are set explicitly; override via FLYWAY_URL/FLYWAY_USER/FLYWAY_PASSWORD env vars.
flyway.url=jdbc:postgresql://db:5432/modulodb
flyway.user=postgres
flyway.password=postgres
flyway.schemas=application,security
flyway.locations=filesystem:/flyway/sql/migrations
flyway.baselineOnMigrate=true
flyway.outOfOrder=true
flyway.validateOnMigrate=false
flyway.createSchemas=true
