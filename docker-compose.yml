version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
        - VITE_KEYCLOAK_URL=${VITE_KEYCLOAK_URL:-http://localhost:8180/realms/modulo}
        - VITE_KEYCLOAK_CLIENT_ID=${VITE_KEYCLOAK_CLIENT_ID:-modulo-frontend}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - modulo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      # Serve the API at the root so the controllers' own "/api/..." request
      # mappings resolve as written. application.yml sets a "/api" servlet
      # context-path, which combined with the "/api/..." mappings would push
      # every endpoint to "/api/api/..." -- so GET /api/notes (what the
      # frontend and the MockMvc tests expect) 404s. Scoped here so the
      # k8s/azure configs, whose actuator probes (/api/actuator/health) rely on
      # the context-path, are untouched.
      #
      # The value must be "/" (not empty): Spring Boot normalizes "/" to root
      # (cleanContextPath strips the trailing slash), but the app's custom
      # ServerProperties validator has @NotBlank on contextPath, so an empty
      # string fails startup with "Context path is required".
      - SERVER_SERVLET_CONTEXT_PATH=/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-modulodb}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      # Knowledge-graph projection (Neo4j). Credentials must match the neo4j service's
      # NEO4J_AUTH below; the projection degrades gracefully if Neo4j is unreachable.
      - SPRING_NEO4J_URI=${SPRING_NEO4J_URI:-bolt://neo4j:7687}
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=${NEO4J_USER:-neo4j}
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=${NEO4J_PASSWORD:-stagingpassword123}
      - MODULO_GRAPH_ENABLED=${MODULO_GRAPH_ENABLED:-true}
      - MODULO_GRAPH_BACKFILL_ON_STARTUP=${MODULO_GRAPH_BACKFILL_ON_STARTUP:-true}
      # Dev-only defaults that satisfy ModuloProperties validation. Override in production.
      - MODULO_SECURITY_JWT_SECRET=${MODULO_SECURITY_JWT_SECRET:-ZGV2LW9ubHktSldULXNlY3JldC1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbg==}
      - MODULO_SECURITY_API_KEY=${MODULO_SECURITY_API_KEY:-mod_devLocalApiKeyChangeMe123456}
      - MODULO_SECURITY_ENCRYPTION_KEY=${MODULO_SECURITY_ENCRYPTION_KEY:-default-encryption-key-32-chars-long}
      # Trust Keycloak-issued bearer tokens on the API. JWKS is fetched over the
      # internal docker network; the issuer is validated against the browser-facing URL.
      - MODULO_SECURITY_KEYCLOAK_JWK_SET_URI=${MODULO_SECURITY_KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/modulo/protocol/openid-connect/certs}
      - MODULO_SECURITY_KEYCLOAK_ISSUER_URI=${MODULO_SECURITY_KEYCLOAK_ISSUER_URI:-http://localhost:8180/realms/modulo}
      # Export traces to the in-stack OTel collector. Without this the OTel SDK
      # defaults to localhost:4317, which isn't reachable from inside the
      # container, and floods the log with "Failed to export spans" warnings.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - MODULO_INTEGRATIONS_IPFS_NODE_URL=http://ipfs:5001
      - MODULO_INTEGRATIONS_IPFS_GATEWAY_URL=http://ipfs:8080
      - MODULO_INTEGRATIONS_IPFS_ENABLED=true
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      keycloak:
        condition: service_started
      # NOTE: the schema is owned entirely by Hibernate (ddl-auto=update). The
      # only non-entity tables (plugin_registry et al.) are seeded by
      # database/init/02-plugin-registry.sql at Postgres first-init. Flyway is
      # intentionally NOT part of this stack: its V1 migration defines a
      # UUID-based notes/users/tags schema that collides with the JPA entities
      # (BIGINT ids) on the `application` schema and fails the whole run.
    networks:
      - modulo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/", "-o", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HEALTH_ENABLED=true
    ports:
      # Host 8180 -> container 8080 (8080/8081 are taken by backend/audit-collector)
      - "8180:8080"
    volumes:
      - ./keycloak/realm-modulo.json:/opt/keycloak/data/import/realm-modulo.json:ro,z
    networks:
      - modulo-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-modulodb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:z
    networks:
      - modulo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    # Remove a stale pid left by an unclean shutdown (Ctrl+C) so the container
    # doesn't crash-loop with "Neo4j is already running (pid:N)" on restart.
    command: ["bash", "-c", "rm -f /data/run/neo4j.pid /var/lib/neo4j/run/neo4j.pid 2>/dev/null || true; exec /startup/docker-entrypoint.sh neo4j"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/stagingpassword123
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=256m
      - NEO4J_dbms_default__listen__address=0.0.0.0
      - NEO4J_dbms_connector_bolt_listen__address=:7687
      - NEO4J_dbms_connector_http_listen__address=:7474
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - modulo-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p stagingpassword123 'MATCH (n) RETURN count(n) LIMIT 1;' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Audit logging and monitoring services
  audit-collector:
    build:
      context: ./services/audit-collector
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - LOKI_ENDPOINT=http://loki:3100
      - ELASTIC_ENDPOINT=http://elasticsearch:9200
      - AUDIT_RETENTION_DAYS=90
      - BATCH_SIZE=100
      - DENIAL_RATE_THRESHOLD=0.1
      - SUSPICIOUS_ACTIONS_THRESHOLD=10
    depends_on:
      - loki
      - elasticsearch
    networks:
      - modulo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OpenTelemetry Collector for trace correlation
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.90.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel/otel-config.yaml:/etc/otel-collector-config.yaml:z
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics
      - "13133:13133" # Health check
    depends_on:
      - jaeger
      - prometheus
      - loki
    networks:
      - modulo-network
    restart: unless-stopped

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - modulo-network
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.48.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - ./monitoring/alerts:/etc/prometheus/rules:z
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - modulo-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:z
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:z
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - modulo-network
    restart: unless-stopped

  # Loki for log aggregation
  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:z
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - modulo-network
    restart: unless-stopped

  # Elasticsearch for searchable audit logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - modulo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # IPFS node for E2E encrypted note sharing (#265)
  ipfs:
    image: ipfs/kubo:v0.26.0
    ports:
      - "4001:4001"   # Swarm
      - "5001:5001"   # API
      - "8082:8080"   # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    networks:
      - modulo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OPA with audit logging configuration
  opa:
    image: openpolicyagent/opa:0.59.0-envoy
    ports:
      - "9191:9191" # Envoy ext-authz gRPC
      - "8181:8181" # OPA HTTP API
    volumes:
      - ./policy:/policies:z
      - ./infra/opa/config-audit.yaml:/config.yaml:z
    command: 
      - "run"
      - "--server"
      - "--config-file=/config.yaml"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    environment:
      - AUDIT_SERVICE_TOKEN=audit-token-123
    depends_on:
      - audit-collector
    networks:
      - modulo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  backup_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  elasticsearch_data:
    driver: local
  ipfs_data:
    driver: local

networks:
  modulo-network:
    driver: bridge
    name: modulo-network